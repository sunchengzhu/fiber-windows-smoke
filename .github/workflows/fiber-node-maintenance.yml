name: Fiber Windows node maintenance

on:
  schedule:
    - cron: "0 23 * * *" # 07:00 Asia/Shanghai (UTC+8)
  workflow_dispatch:
    inputs:
      ensure_channel:
        description: "Explicitly open/wait for the configured channel if none exists"
        required: false
        default: false
        type: boolean
      send_payment:
        description: "Run the node B -> node A invoice and node A -> Bottle keysend flow"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: fiber-windows-node-maintenance
  cancel-in-progress: false

jobs:
  maintain-node:
    runs-on: [self-hosted, windows, x64, fiber-windows]
    timeout-minutes: 45
    env:
      FIBER_WINDOWS_SETTINGS: C:\fiber-node\automation\settings.json
      FIBER_WINDOWS_SECONDARY_SETTINGS: C:\fiber-node-b\automation\settings.json
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v6

      - name: Validate PowerShell syntax
        shell: powershell
        run: tests\Test-PowerShellSyntax.ps1

      - name: Run module unit checks
        shell: powershell
        run: tests\Test-Module.ps1

      - name: Update node A Fiber binary safely
        shell: powershell
        run: scripts\Update-FiberBinary.ps1

      - name: Update node B Fiber binary safely
        shell: powershell
        run: scripts\Update-FiberBinary.ps1 -SettingsPath $env:FIBER_WINDOWS_SECONDARY_SETTINGS

      - name: Check both nodes and channels
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.ensure_channel }}
        shell: powershell
        run: scripts\Test-PaymentTopology.ps1

      - name: Explicitly ensure node A public channel
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ensure_channel }}
        shell: powershell
        run: scripts\Ensure-Channel.ps1

      - name: Explicitly ensure node B to node A channel
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ensure_channel }}
        shell: powershell
        run: scripts\Ensure-SecondNodeChannel.ps1

      - name: Check newly ensured channels
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ensure_channel }}
        shell: powershell
        run: scripts\Test-PaymentTopology.ps1

      - name: Run scheduled payment flow
        if: ${{ github.event_name == 'schedule' }}
        shell: powershell
        run: scripts\Send-PaymentFlow.ps1 -Scheduled

      - name: Run manually requested payment flow
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_payment }}
        shell: powershell
        run: scripts\Send-PaymentFlow.ps1
